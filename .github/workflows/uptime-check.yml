name: Uptime Double Check

on:
  schedule:
    - cron: '*/5 * * * *'   # a cada 5 minutos
    - cron: '2-59/5 * * * *' # offset de 2min = dupla verificação
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Check site 1 (primary)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://robertomanfroi.github.io/quiz-marketing-suellen/)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Site fora do ar! Status: $STATUS"
            exit 1
          fi
          echo "✅ Site online - $(date)"

      - name: Check site 2 (secondary verification)
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://robertomanfroi.github.io/quiz-marketing-suellen/)
          echo "Segunda verificação HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Falha na dupla verificação! Status: $STATUS"
            exit 1
          fi
          echo "✅ Dupla verificação OK - $(date)"
